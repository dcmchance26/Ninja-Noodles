<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ninja Noodles</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="titleScreen">

<button id="startBtn">
START GAME
</button>

<div id="versionText">
Alpha 0.3
</div>
    </div>

    <div id="gameScreen" style="display:none;">

        <div id="hud">
            <div class="health-container">
                <div id="playerHealth" class="health-bar"></div>
            </div>

            <div class="health-container">
                <div id="enemyHealth" class="health-bar enemy"></div>
            </div>
        </div>

        <div id="arena">

    <div id="messageBox">ROUND 1</div>

    <div id="player" class="fighter"></div>
    <div id="enemy" class="fighter enemyFighter"></div>

</div>

        <div id="controls">

            <div class="leftControls">
                <button id="leftBtn">◀</button>
                <button id="rightBtn">▶</button>
            </div>

            <div class="rightControls">
                <button id="jumpBtn">▲</button>
                <button id="attackBtn">👊</button>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
